    <section id="methodology" class="scroll-mt-20 py-20 bg-neutral-0 border-y border-neutral-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center max-w-3xl mx-auto mb-16">
                <span class="text-xs font-semibold uppercase tracking-wider text-neutral-400">{{methodology.eyebrow}}</span>
                <h2 class="text-2xl sm:text-3xl font-bold text-neutral-900 tracking-tight mt-1">
                    {{methodology.title}}
                </h2>
                <p class="mt-4 text-neutral-600 text-lg leading-relaxed">
                    {{methodology.description}}
                </p>
            </div>

            <div class="max-w-3xl mx-auto">
                {{#each methodology.items}}
                <div class="relative flex gap-6{{#unless last}} pb-10{{/unless}}">
                    <div class="flex flex-col items-center shrink-0">
                        <div class="w-10 h-10 rounded-full bg-primary-lighter border-2 border-primary-main flex items-center justify-center text-xs font-bold text-primary-dark">
                            {{step}}
                        </div>
                        {{#unless last}}
                        <div class="w-px flex-1 bg-neutral-200 mt-3 min-h-[2rem]"></div>
                        {{/unless}}
                    </div>
                    <div class="pt-1.5 pb-2 flex-1">
                        <h3 class="text-neutral-900 font-bold text-lg tracking-tight">{{title}}</h3>
                        <p class="text-neutral-600 text-sm leading-relaxed mt-2">
                            {{description}}
                        </p>
                    </div>
                </div>
                {{/each}}
            </div>
        </div>
    </section>
