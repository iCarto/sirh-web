<section id="challenges" class="scroll-mt-20 py-12 md:py-16 bg-neutral-0 border-y border-neutral-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-10 items-start">
      <div class="lg:col-span-5 space-y-4">
        <span
          class="text-xs font-semibold uppercase tracking-wider text-neutral-400"
          >{{challenges.eyebrow}}</span
        >
        <h2
          class="text-2xl sm:text-3xl font-bold text-neutral-900 tracking-tight"
        >
          {{challenges.title}}
        </h2>
        <p class="text-neutral-600 leading-relaxed">
          {{challenges.description}}
        </p>
      </div>

      <div class="lg:col-span-7">
        <ul class="space-y-3" role="list">
          {{#each challenges.items}}
          <li
            class="rounded-lg border border-neutral-200 border-l-[3px] border-l-neutral-400 bg-neutral-50 px-4 py-3.5"
          >
            <span
              class="text-xs font-semibold uppercase tracking-wide text-neutral-700"
              >{{tag}}</span
            >
            <p class="mt-1 text-sm text-neutral-600 leading-relaxed">
              {{problem}}
            </p>
          </li>
          {{/each}}
        </ul>
      </div>
    </div>
  </div>
</section>
