<section id="challenges" class="scroll-mt-20 py-16 md:py-20 bg-gradient-to-b from-neutral-0 to-primary-lighter/20 border-y border-neutral-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-10 items-start">
      <div class="lg:col-span-5 space-y-4">
        <span
          class="text-xs font-semibold uppercase tracking-wider text-neutral-400"
          >{{challenges.eyebrow}}</span
        >
        <h2
          class="text-2xl sm:text-3xl font-bold text-neutral-900 tracking-tight"
        >
          {{challenges.title}}
        </h2>
        <p class="text-neutral-600 leading-relaxed">
          {{challenges.description}}
        </p>
      </div>

      <div class="lg:col-span-7">
        <ul class="space-y-4" role="list">
          {{#each challenges.items}}
          <li
            class="rounded-lg border border-neutral-200 border-l-4 border-l-neutral-400 bg-neutral-50 px-5 py-4 hover:border-primary-light/80 transition-colors"
          >
            <span
              class="inline-flex items-center gap-2 text-xs font-semibold uppercase tracking-wide text-primary-dark"
              ><span class="w-1.5 h-1.5 rounded-full bg-primary-main animate-pulse"></span
              >{{tag}}</span
            >
            <p class="mt-1 text-sm text-neutral-600 leading-relaxed">
              {{problem}}
            </p>
          </li>
          {{/each}}
        </ul>
      </div>
    </div>
  </div>
</section>
