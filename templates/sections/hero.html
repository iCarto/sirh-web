<section
  class="relative bg-neutral-0 pt-12 pb-20 md:pt-20 md:pb-28 overflow-hidden"
>
  <div
    class="absolute inset-0 opacity-[0.015] pointer-events-none bg-[radial-gradient(theme(colors.primary.main)_1px,transparent_1px)] [background-size:16px_16px]"
  ></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
      <div class="lg:col-span-6 space-y-6">
        <div
          class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary-lighter border border-primary-light text-xs font-semibold text-primary-dark uppercase tracking-wider"
        >
          <span
            class="w-1.5 h-1.5 rounded-full bg-primary-main animate-pulse"
          ></span>
          {{hero.badge}}
        </div>

        <h1
          class="text-3xl sm:text-4xl lg:text-5xl font-bold text-neutral-900 tracking-tight leading-[1.15]"
        >
          {{hero.title}}
          <span class="text-primary-main font-semibold"
            >{{hero.titleHighlight}}</span
          >
          {{hero.titleSuffix}}
        </h1>

        <p class="text-lg text-neutral-600 leading-relaxed max-w-2xl">
          {{hero.description}}
        </p>

        <div
          class="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 pt-4"
        >
          <a
            href="{{hero.ctaPrimaryHref}}"
            class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-primary-contrastText bg-primary-main hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-main transition-all shadow-md text-center"
          >
            {{hero.ctaPrimary}}
          </a>
          <a
            href="{{hero.ctaSecondaryHref}}"
            class="inline-flex items-center justify-center px-6 py-3 border border-neutral-200 text-base font-medium rounded-md text-neutral-600 bg-neutral-50 hover:bg-neutral-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-main transition-all text-center"
          >
            {{hero.ctaSecondary}}
          </a>
        </div>
      </div>

      <div class="lg:col-span-6 relative">
        <div
          class="relative mx-auto w-full max-w-xl lg:max-w-none rounded-xl border border-neutral-200 bg-neutral-900/5 p-2 shadow-md backdrop-blur-sm"
        >
          <div
            class="bg-neutral-0 rounded-lg border border-neutral-200 overflow-hidden shadow-sm"
          >
            <div
              class="bg-neutral-50 px-4 py-3 border-b border-neutral-200 flex items-center justify-between"
            >
              <div class="flex items-center gap-1.5">
                <span class="w-2.5 h-2.5 rounded-full bg-neutral-300"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-neutral-300"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-neutral-300"></span>
                <span class="ml-2 text-xs font-mono text-neutral-400"
                  >{{hero.browserUrl}}</span
                >
              </div>
              <span
                class="text-[10px] bg-neutral-100 text-neutral-600 border border-neutral-200 px-2.5 py-0.5 rounded font-medium"
                >{{hero.browserBadge}}</span
              >
            </div>

            <div
              class="aspect-[16/10] bg-neutral-100 flex flex-col items-center justify-center relative overflow-hidden"
            >
              <img
                src="{{hero.screenshot}}"
                alt="{{hero.screenshotAlt}}"
                class="w-full h-full object-cover object-top"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
