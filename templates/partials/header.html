<header
  class="sticky top-0 z-50 bg-neutral-900 text-neutral-0 shadow-[0_3px_9px_rgba(0,0,0,0.45)]"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a
        href="{{brand.link}}"
        class="flex items-center gap-3 shrink-0 rounded focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-6 focus:ring-offset-neutral-900"
        aria-label="{{brand.name}}"
      >
        <img
          src="{{brand.logoWhite}}"
          alt="{{brand.name}}"
          class="h-16 w-auto"
        />
      </a>

      <nav
        class="hidden md:flex space-x-8 text-sm font-medium text-neutral-300"
        aria-label="Main navigation"
      >
        {{#each nav}}
        <a
          href="{{href}}"
          class="text-xs uppercase tracking-wide hover:text-neutral-0 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 rounded px-1 transition-colors"
          >{{label}}</a
        >
        {{/each}}
      </nav>

      <div class="hidden md:flex items-center gap-4">
        <div
          class="flex items-center gap-1 text-xs font-medium text-neutral-400"
        >
          <a
            href="{{alternate.en}}"
            class="px-2 py-1 rounded {{langActive.en}} hover:text-neutral-0 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 transition-colors"
            >EN</a
          >
          <span class="text-neutral-600" aria-hidden="true">|</span>
          <a
            href="{{alternate.es}}"
            class="px-2 py-1 rounded {{langActive.es}} hover:text-neutral-0 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 transition-colors"
            >ES</a
          >
          <span class="text-neutral-600" aria-hidden="true">|</span>
          <a
            href="{{alternate.pt}}"
            class="px-2 py-1 rounded {{langActive.pt}} hover:text-neutral-0 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 transition-colors"
            >PT</a
          >
        </div>
        <a
          href="{{cta.headerHref}}"
          class="inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-primary-contrastText bg-primary-main hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-neutral-900 focus:ring-primary-light transition-all shadow-sm"
        >
          {{cta.header}}
        </a>
      </div>

      <details class="mobile-menu md:hidden relative">
        <summary
          class="list-none inline-flex h-10 w-10 shrink-0 cursor-pointer items-center justify-center rounded-md text-neutral-300 hover:text-neutral-0 hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 transition-colors [&::-webkit-details-marker]:hidden relative z-[60]"
          aria-label="Open menu"
        >
          <span class="icon-menu inline-flex items-center justify-center">{{iconSvg "menu"}}</span>
          <span class="icon-close inline-flex items-center justify-center">{{iconSvg "x-mark"}}</span>
        </summary>
        <div
          class="fixed inset-0 z-50 flex flex-col bg-neutral-900 px-6 pt-24 pb-8 overflow-y-auto"
          aria-label="Mobile navigation"
        >
          <nav class="flex flex-col gap-1">
            {{#each nav}}
            <a
              href="{{href}}"
              class="py-3 text-base font-medium uppercase tracking-wide text-neutral-300 hover:text-neutral-0 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 rounded px-1 transition-colors"
              >{{label}}</a
            >
            {{/each}}
          </nav>

          <div class="mt-auto flex flex-col items-center gap-6 pt-10">
            <div
              class="flex items-center gap-2 text-base font-medium text-neutral-400"
            >
              <a
                href="{{alternate.en}}"
                class="inline-flex min-h-11 min-w-11 items-center justify-center rounded px-4 py-3 {{langActive.en}} hover:text-neutral-0 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 transition-colors"
                >EN</a
              >
              <span class="text-neutral-600" aria-hidden="true">|</span>
              <a
                href="{{alternate.es}}"
                class="inline-flex min-h-11 min-w-11 items-center justify-center rounded px-4 py-3 {{langActive.es}} hover:text-neutral-0 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 transition-colors"
                >ES</a
              >
              <span class="text-neutral-600" aria-hidden="true">|</span>
              <a
                href="{{alternate.pt}}"
                class="inline-flex min-h-11 min-w-11 items-center justify-center rounded px-4 py-3 {{langActive.pt}} hover:text-neutral-0 focus:outline-none focus:ring-2 focus:ring-primary-light focus:ring-offset-2 focus:ring-offset-neutral-900 transition-colors"
                >PT</a
              >
            </div>
            <a
              href="{{cta.headerHref}}"
              class="inline-flex w-full max-w-sm items-center justify-center px-4 py-3 border border-transparent text-base font-medium rounded-md text-primary-contrastText bg-primary-main hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-neutral-900 focus:ring-primary-light transition-all shadow-sm"
            >
              {{cta.header}}
            </a>
          </div>
        </div>
      </details>
    </div>
  </div>
</header>
