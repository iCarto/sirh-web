<!doctype html>
<html lang="{{meta.lang}}" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{meta.title}}</title>
    <meta name="description" content="{{meta.description}}" />
    <meta property="og:title" content="{{meta.title}}" />
    <meta property="og:description" content="{{meta.description}}" />
    <meta
      property="og:image"
      content="{{basePath}}/images/SIRH_screenshot_map.webp"
    />
    <meta property="og:type" content="website" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{basePath}}/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="{{basePath}}/images/favicon-192x192.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{basePath}}/images/apple-touch-icon.png"
    />
    <link rel="alternate" hreflang="en" href="{{alternate.en}}" />
    <link rel="alternate" hreflang="es" href="{{alternate.es}}" />
    <link rel="alternate" hreflang="pt" href="{{alternate.pt}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="application/json" id="sirh-tailwind-colors">
      {{tailwindColorsJson}}
    </script>
    <script>
      const sirhThemeColors = JSON.parse(
        document.getElementById("sirh-tailwind-colors").textContent,
      );
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: sirhThemeColors,
          },
        },
      };
    </script>
    <style>
      .skip-link {
        position: absolute;
        left: -9999px;
        z-index: 100;
        padding: 0.75rem 1rem;
        font-weight: 600;
        font-size: 0.875rem;
        border-radius: 0.375rem;
      }
      .skip-link:focus {
        left: 1rem;
        top: 1rem;
      }
      body {
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .shadow-card {
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
      }
      .shadow-card-hover:hover {
        box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.2);
      }
      body:has(.mobile-menu[open]) {
        overflow: hidden;
      }
      .mobile-menu > summary .icon-close {
        display: none;
      }
      .mobile-menu[open] > summary .icon-menu {
        display: none;
      }
      .mobile-menu[open] > summary .icon-close {
        display: inline-flex;
      }
      .mobile-menu > summary svg {
        display: block;
      }
    </style>
  </head>
  <body
    class="bg-neutral-50 text-neutral-900 font-sans antialiased selection:bg-primary-light selection:text-primary-dark"
  >
    <a
      href="#main-content"
      class="skip-link bg-primary-main text-primary-contrastText"
      >Skip to content</a
    >

    {{sections}}
    <script src="{{basePath}}/js/mobile-menu.js" defer></script>
  </body>
</html>
